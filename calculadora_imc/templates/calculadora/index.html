<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SENAI | CALCULADORA IMC</title>
    <style>
        :root {
            --primary-color: #2c3e50;
            --secondary-color: #e74c3c;
            --accent-color: #3498db;
            --bg-color: #ecf0f1;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 450px;
        }

        h1 {
            color: var(--primary-color);
            text-align: center;
            border-bottom: 3px solid var(--secondary-color);
            padding-bottom: 10px;
            margin-bottom: 25px;
            font-size: 24px;
        }

        form {
            display: flex;
            flex-direction: column;
        }

        label {
            font-weight: bold;
            margin-bottom: 5px;
            color: var(--primary-color);
        }

        input {
            padding: 12px;
            margin-bottom: 20px;
            border: 2px solid #bdc3c7;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        input:focus {
            border-color: var(--accent-color);
            outline: none;
        }

        button {
            background-color: var(--secondary-color);
            color: white;
            padding: 15px;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
        }

        button:hover {
            background-color: #c0392b;
        }

        .resultado-box {
            margin-top: 25px;
            padding: 20px;
            background-color: #f8f9fa;
            border-left: 5px solid var(--accent-color);
            border-radius: 5px;
            text-align: center;
        }

        .resultado-box h2 {
            margin: 0;
            color: var(--accent-color);
            font-size: 28px;
        }

        .resultado-box p {
            margin: 5px 0 0;
            font-size: 18px;
            color: var(--primary-color);
            font-weight: bold;
        }

        .footer {
            margin-top: 20px;
            font-size: 12px;
            text-align: center;
            color: #7f8c8d;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>SENAI CALCULADORA</h1>
    
    <form method="POST">
        {% csrf_token %}
        
        <label for="peso">Peso Atual (kg)</label>
        <input type="number" step="0.01" name="peso" id="peso" placeholder="Ex: 85,50" required>

        <label for="altura">Altura Atual (m)</label>
        <input type="number" step="0.01" name="altura" id="altura" placeholder="Ex: 1,75" required>

        <button type="submit">CALCULAR IMC</button>
    </form>

    {% if resultado %}
        <div class="resultado-box">
            <h2>{{ resultado }}</h2>
            <p>{{ classificacao }}</p>
        </div>
    {% endif %}

    <div class="footer">
        Desenvolvido em Python & Django
    </div>
</div>

</body>
</html>
