<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Átomo</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background-color: #121212;
      font-family: Arial, sans-serif;
    }

    .atomo {
      position: relative;
      width: 260px;
      height: 260px;
    }

    /* órbitas */
    .orbita {
      position: absolute;
      width: 100%;
      height: 100%;
      border: 2px solid #00ffff;
      border-radius: 50%;
      animation: girar 6s linear infinite;
    }

    .orbita:nth-child(2) {
      transform: rotate(30deg);
      animation-duration: 8s;
    }

    .orbita:nth-child(3) {
      transform: rotate(-30deg);
      animation-duration: 10s;
    }

    .orbita:nth-child(4) {
      transform: rotate(60deg);
      animation-duration: 12s;
    }

    .orbita:nth-child(5) {
      transform: rotate(-60deg);
      animation-duration: 14s;
    }

    /* elétron */
    .eletron {
      width: 12px;
      height: 12px;
      background-color: #00ffff;
      border-radius: 50%;
      position: absolute;
      top: -6px;
      left: 50%;
      transform: translateX(-50%);
      box-shadow: 0 0 10px #00ffff;
    }

    /* núcleo */
    .nucleo {
      position: absolute;
      width: 25px;
      height: 25px;
      background-color: #ff4444;
      border-radius: 50%;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      box-shadow: 0 0 15px #ff4444;
    }

    @keyframes girar {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>

  <div class="atomo">
    <div class="orbita"><div class="eletron"></div></div>
    <div class="orbita"><div class="eletron"></div></div>
    <div class="orbita"><div class="eletron"></div></div>
    <div class="orbita"><div class="eletron"></div></div>
    <div class="orbita"><div class="eletron"></div></div>
    <div class="nucleo"></div>
  </div>

</body>
</html>
