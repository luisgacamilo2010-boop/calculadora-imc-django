<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Contador de Letras</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 40px;
      background: #f4f4f4;
    }

    .container {
      max-width: 600px;
      margin: auto;
      background: white;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    textarea {
      width: 100%;
      height: 150px;
      padding: 10px;
      font-size: 16px;
    }

    .resultado {
      margin-top: 15px;
      font-size: 18px;
      font-weight: bold;
    }
  </style>
</head>

<body>

  <div class="container">
    <h2>Contador de Letras (sem espaços)</h2>

    <textarea id="texto" placeholder="Digite seu texto aqui..."></textarea>

    <div class="resultado">
      Letras (sem espaços): <span id="contador">0</span>
    </div>
  </div>

  <script>
    const textarea = document.getElementById("texto");
    const contador = document.getElementById("contador");

    textarea.addEventListener("input", () => {
      // remove espaços, quebras de linha e tabs
      const semEspacos = textarea.value.replace(/\s/g, "");
      contador.textContent = semEspacos.length;
    });
  </script>

</body>
</html>
