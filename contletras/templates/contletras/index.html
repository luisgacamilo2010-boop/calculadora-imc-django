<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contador de Letras</title>
    <style>
        body { font-family: sans-serif; background-color: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 400px; text-align: center; }
        h2 { color: #333; border-bottom: 2px solid #2ecc71; padding-bottom: 10px; margin-bottom: 25px; }
        .input-group { text-align: left; margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; color: #333; }
        input { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; font-size: 16px; color: #666; }
        button { width: 100%; padding: 12px; background-color: #2ecc71; color: white; border: none; border-radius: 8px; font-weight: bold; font-size: 16px; cursor: pointer; margin-top: 10px; }
        button:hover { background-color: #27ae60; }
        .footer { margin-top: 20px; font-size: 12px; color: #999; }
        .resultado { margin-top: 20px; font-size: 18px; color: #2ecc71; font-weight: bold; }
    </style>
</head>
<body>

<div class="card">
    <h2>CONTADOR DE LETRAS</h2>
    
    <form method="POST">
        {% csrf_token %}
        <div class="input-group">
            <label>Digite uma frase ou nome:</label>
            <input type="text" name="frase" value="{{ frase }}" placeholder="Ex: SENAI Sertãozinho" required>
        </div>
        
        <button type="submit">CONTAR AGORA</button>
    </form>

    {% if resultado != None %}
        <div class="resultado">Total de letras: {{ resultado }}</div>
    {% endif %}

    <div class="footer">Desenvolvido em Python & Django</div>
</div>

</body>
</html>
